<!DOCTYPE html>

body{
font-family:Tahoma,Arial;
margin:0;
background:#eef6fb;

}

/* هيدر احترافي */
.header{
background: linear-gradient(135deg, #4facfe, #00c6ff);
padding:30px;
font-size:26px;

text-align:center;
border-radius:0 0 20px 20px;

}

.container{

}

.branch{

}

.branch h3{
margin:0;
color:#0c5f8f;
}

.branch p{
color:#555;
margin:10px 0 20px;
}

.buttons{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:10px 18px;
border-radius:7px;
font-size:14px;
cursor:pointer;
}

.call{
background:#1fb37a;
color:white;
}

.map{
background:#1c82c3;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

footer{
margin-top:25px;
color:#777;
font-size:13px;
padding-bottom:20px;
}

</style>
